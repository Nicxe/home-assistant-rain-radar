name: Label issue component

on:
  issues:
    types: [opened, edited]

permissions:
  issues: write

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - name: Ensure labels
        uses: actions/github-script@v7
        with:
          script: |
            const labels = {
              integration: "0366d6",
              card: "5319e7",
              "provider: met.no": "0e8a16",
              "provider: smhi": "fbca04",
              "provider: dmi": "fbca04"
            };
            for (const [name, color] of Object.entries(labels)) {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name
                });
              } catch (error) {
                if (error.status === 404) {
                  await github.rest.issues.createLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    name,
                    color
                  });
                } else {
                  throw error;
                }
              }
            }
      - name: Apply component labels
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body || "";
            const desired = new Set();
            if (/Integration/i.test(body) || /Both/i.test(body)) desired.add("integration");
            if (/Radar Card/i.test(body) || /Both/i.test(body)) desired.add("card");
            if (/MET Norway|met\.no/i.test(body)) desired.add("provider: met.no");
            if (/SMHI/i.test(body)) desired.add("provider: smhi");
            if (/DMI/i.test(body)) desired.add("provider: dmi");
            if (desired.size === 0) return;
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: [...desired]
            });

